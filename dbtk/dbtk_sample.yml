# dbtk sample configuration file
# Copy to ~/.config/dbtk.yml and customize

settings:
  default_batch_size: 1000
  default_country: US
  default_timezone: UTC

  # Logging configuration for integration scripts
  logging:
    directory: ./logs                  # Directory for log files
    level: INFO                         # DEBUG, INFO, WARNING, ERROR, CRITICAL
    format: '%(asctime)s [%(levelname)s] %(name)s: %(message)s'
    timestamp_format: '%Y-%m-%d %H:%M:%S'  # Format for timestamps in log messages
    filename_format: '%Y%m%d_%H%M%S'   # Timestamp format for log filenames
                                        # Set to '%Y%m%d' for one log per day
                                        # Set to '' for single rolling log file (no timestamp)
    split_errors: true                  # Create separate _error.log file for errors
    console: true                       # Also output to console
    retention_days: 30                  # Days to keep old log files (for cleanup_old_logs)

connections:
  # Example connection configurations
  sample_postgres:
    driver: psycopg    # Optional, psycopg2 has the highest priority, this will ensure psycopg(3) is used if both are installed
    type: postgres     # type is optional IF you specify a driver
    host: localhost
    port: 5432
    database: myapp_dev
    user: developer
    cursor:                 # These settings will be passed down when creating a cursor
      batch_size: 4000
      debug: False
      return_cursor: True
    # password: prompt  # Will prompt for password
    # encrypted_password: gAAAAABh...  # Or use encrypted

  sample_oracle:
    type: oracle
    host: oracle.company.com
    port: 1521
    database: prod.company.com
    user: app_user
    encrypted_password: gAAAAABh...

  # OCI Resource Principal — for code running inside OCI (compute, functions, containers).
  # No credentials needed; the OCI runtime provides the identity automatically.
  sample_oracle_resource_principal:
    type: oracle
    driver: oracledb        # requires oracledb >= 4.0
    dsn: mydb.adb.us-phoenix-1.oraclecloud.com:1521/myservice_high
    extra_auth_params:
      auth_type: ResourcePrincipal

  # OCI Session Token — for code running outside OCI, authenticating via OCI IAM.
  # Reads token and key from your OCI config file (defaults to ~/.oci/config).
  sample_oracle_session_token:
    type: oracle
    driver: oracledb        # requires oracledb >= 4.0
    dsn: mydb.adb.us-phoenix-1.oraclecloud.com:1521/myservice_high
    extra_auth_params:
      auth_type: SecurityToken
      # file_location: ~/.oci/config   # optional, this is the default
      # profile: DEFAULT               # optional, this is the default

  sample_odbc_dsn:
    driver: pyodbc_postgres
    dsn: IMDB_PG  # user or system DSN
    password: '${IMDB_USER_PASS}'    # Pull from environment variable

  sample_odbc:
    driver: pyodbc_postgres
    host: localhost
    port: 5432
    database: imdb
    user: imdb_user
    encrypted_password: gAAAAABh...

  sample_sqlserver:
    driver: pyodbc_sqlserver
    type: sqlserver
    host: localhost\SQLEXPRESS  # Use instance name; omit port when using instance names
    database: myapp_dev
    user: dev_user
    password: prompt
    cursor:
      fast_executemany: true  # Recommended for bulk operations; disable if using TEXT/NVARCHAR(MAX)/JSON columns

  sample_sqlite:
    type: sqlite
    database: /data/test_states.db

# Encrypted passwords (optional)
passwords:
  sample_openai_key:
    description: "OpenAI API key for data processing"
    encrypted_password: gAAAAABh...

# Custom driver definitions (optional)
drivers:
  firbird:
    database_type: firebird
    # only required if name (firebird) does not match module (import) name
    module: firebird.driver
    # lowest number with installed library will be used first
    priority: 1
    # if driver does not use standard names (user, password, host, port, database) map them here
    param_map: { }  # {'database': 'db', 'password': 'passwd'}
    # must have either: host, database and user OR dsn
    required_params: [ { 'host', 'database', 'user' }, { 'dsn' } ]
    optional_params: { 'port', 'password' }
    # kwargs (most common), odbc_string (all odbc), connection_string (psycopg*), dsn (oracle)
    connection_method: kwargs
    default_port: 3050